<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>📱 Smartphone Channel Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
</head>
<body class="bg-gray-50">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const WORKER = "https://cool-firefly-fb18.hpqhwyg5ws.workers.dev";

const DEFAULT_CHANNELS = {
  mx: [
    { handle: "samsungmexico", name: "Samsung Mexico" },
    { handle: "OPPOMexico", name: "OPPO Mexico" },
    { handle: "honor_mexico", name: "HONOR Mexico" },
    { handle: "HuaweiMobileMx", name: "Huawei Mobile MX" },
    { handle: "vivomobilemx", name: "vivo Mexico" },
    { handle: "motorola_mx", name: "Motorola Mexico" },
    { handle: "GoogleMexico", name: "Google Mexico" },
    { handle: "Xiaomi.Mexico", name: "Xiaomi Mexico" },
    { handle: "realmeMéxico", name: "realme Mexico" },
  ],
  br: [
    { handle: "samsungbrasil", name: "Samsung Brasil" },
    { handle: "Xiaomi.Brasil", name: "Xiaomi Brasil" },
    { handle: "oppobrasil", name: "OPPO Brasil" },
    { handle: "realmeBrasil", name: "realme Brasil" },
    { handle: "HONOR.Brasil", name: "HONOR Brasil" },
    { handle: "Jovi.Brasil", name: "Jovi Brasil" },
    { handle: "MotoBRA", name: "Motorola Brasil" },
  ],
};

const fmtN = n => {
  if (n == null) return "N/A";
  n = parseInt(n);
  if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
  if (n >= 1e3) return (n/1e3).toFixed(1)+"K";
  return String(n);
};
const fmtD = d => d ? new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";

function Badge({ children, color="gray" }) {
  const c = { gray:"bg-gray-100 text-gray-600", blue:"bg-blue-50 text-blue-700", green:"bg-green-50 text-green-700" };
  return <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${c[color]}`}>{children}</span>;
}

function ChannelCard({ ch }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
      <div className="p-5">
        <div className="flex items-start justify-between gap-3 mb-3">
          <div className="flex items-center gap-2">
            {ch.thumb && <img src={ch.thumb} className="w-9 h-9 rounded-full" alt="" />}
            <div>
              <h3 className="font-semibold text-gray-900">{ch.name}</h3>
              <a href={`https://youtube.com/@${ch.handle}`} target="_blank" rel="noreferrer" className="text-xs text-blue-500 hover:underline">@{ch.handle}</a>
            </div>
          </div>
          <Badge color="blue">{ch.videos.length} video{ch.videos.length!==1?"s":""}</Badge>
        </div>
        <div className="bg-gray-50 rounded-xl p-3 mb-3 text-sm text-gray-700 leading-relaxed">
          <span className="text-xs font-medium text-gray-400 uppercase tracking-wide block mb-1">Takeaway</span>
          {ch.takeaway}
        </div>
        <button onClick={()=>setOpen(!open)} className="text-sm text-blue-600 font-medium hover:text-blue-800">
          {open ? "▲ Hide videos" : "▼ Show videos"}
        </button>
      </div>
      {open && (
        <div className="border-t border-gray-100 divide-y divide-gray-100">
          {ch.videos.map((v,i) => (
            <div key={i} className="p-4 hover:bg-gray-50">
              <div className="flex gap-3">
                {v.thumb && <img src={v.thumb} className="w-20 h-14 rounded-lg object-cover flex-shrink-0" alt="" />}
                <div className="flex-1 min-w-0">
                  <a href={`https://youtube.com/watch?v=${v.id}`} target="_blank" rel="noreferrer"
                    className="font-medium text-sm text-gray-800 hover:text-blue-600 block mb-1 leading-snug">{v.title}</a>
                  <div className="flex gap-3 text-xs text-gray-400 mb-1">
                    <span>📅 {fmtD(v.publishedAt)}</span>
                    <span>👁 {fmtN(v.viewCount)}</span>
                    <span>👍 {fmtN(v.likeCount)}</span>
                  </div>
                  <p className="text-xs text-gray-600 leading-relaxed">{v.summary}</p>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DebugLog({ logs }) {
  const [open, setOpen] = useState(false);
  if (!logs.length) return null;
  return (
    <div className="mt-4 border border-gray-200 rounded-xl overflow-hidden text-xs">
      <button onClick={()=>setOpen(!open)} className="w-full flex items-center justify-between px-4 py-2 bg-gray-50 text-gray-500 font-medium hover:bg-gray-100">
        <span>🔍 Debug log ({logs.length} entries)</span><span>{open?"▲":"▼"}</span>
      </button>
      {open && (
        <div className="divide-y divide-gray-100 max-h-64 overflow-y-auto">
          {logs.map((l,i) => (
            <div key={i} className={`px-4 py-1.5 font-mono ${l.type==="error"?"text-red-600 bg-red-50":l.type==="warn"?"text-yellow-700 bg-yellow-50":"text-gray-600"}`}>
              {l.msg}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AddChannelForm({ country, onAdd }) {
  const [handle, setHandle] = useState("");
  const [name, setName] = useState("");
  const [msg, setMsg] = useState("");
  const submit = () => {
    if (!handle.trim()||!name.trim()) { setMsg("Fill in both fields."); return; }
    const h = handle.trim().replace(/^@/,"").replace(/.*youtube\.com\/@?/,"").replace(/\/.*/,"");
    onAdd(country, { handle: h, name: name.trim() });
    setHandle(""); setName(""); setMsg("✓ Added! Hit Refresh to include it.");
    setTimeout(()=>setMsg(""),3000);
  };
  return (
    <div className="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
      <h3 className="font-semibold text-gray-800 mb-3 text-sm">＋ Add Channel</h3>
      <div className="flex flex-col gap-2">
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Display name" className="border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400" />
        <input value={handle} onChange={e=>setHandle(e.target.value)} placeholder="@handle or full URL" className="border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400" />
        <button onClick={submit} className="bg-gray-900 text-white text-sm rounded-lg px-4 py-2 hover:bg-gray-700 font-medium">Add Channel</button>
        {msg && <p className="text-xs text-green-600">{msg}</p>}
      </div>
    </div>
  );
}

function App() {
  const [country, setCountry] = useState("mx");
  const [channels, setChannels] = useState(DEFAULT_CHANNELS);
  const [results, setResults] = useState({ mx: null, br: null });
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState("");
  const [logs, setLogs] = useState([]);
  const [lastUpdated, setLastUpdated] = useState({ mx: null, br: null });

  const log = (msg, type="info") => setLogs(l => [...l, { msg, type }]);

  const refresh = async (c) => {
    setLoading(true); setLogs([]);
    setProgress("Connecting to worker…");
    const since = new Date();
    since.setDate(since.getDate() - 30);
    log(`Starting ${c.toUpperCase()} — cutoff: ${since.toDateString()}`);
    log(`Sending ${channels[c].length} channels to worker…`);
    try {
      setProgress("Worker is fetching YouTube data & running AI analysis…");
      const res = await fetch(`${WORKER}/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ handles: channels[c], since: since.toISOString() }),
      });
      if (!res.ok) { const txt = await res.text(); throw new Error(`Worker HTTP ${res.status}: ${txt.slice(0,200)}`); }
      const data = await res.json();
      log(`Worker returned ${data.length} results`);
      const out = [];
      for (const ch of data) {
        if (ch.error) { log(`✗ ${ch.name}: ${ch.error}`, "error"); continue; }
        if (ch.skipped) { log(`⏭ ${ch.name}: no smartphone videos in last 30 days`, "warn"); continue; }
        log(`✅ ${ch.name}: ${ch.videos.length} videos`);
        out.push(ch);
      }
      setResults(r => ({ ...r, [c]: out }));
      setLastUpdated(u => ({ ...u, [c]: new Date() }));
      log(`Done — ${out.length} active channel(s)`);
    } catch(e) {
      log(`Fatal: ${e.message}`, "error");
    }
    setProgress(""); setLoading(false);
  };

  const addChannel = (c, ch) => setChannels(p => ({ ...p, [c]: [...p[c], ch] }));
  const current = results[country];

  return (
    <div className="min-h-screen bg-gray-50" style={{fontFamily:"'Inter',sans-serif"}}>
      <div className="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <div>
          <h1 className="font-bold text-gray-900 text-lg">📱 Smartphone Channel Monitor</h1>
          <p className="text-xs text-gray-500 mt-0.5">YouTube API + AI · Last 30 days</p>
        </div>
        <button onClick={()=>refresh(country)} disabled={loading}
          className="flex items-center gap-2 bg-gray-900 text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-gray-700 disabled:opacity-50 transition-colors">
          <span style={loading?{display:"inline-block",animation:"spin 1s linear infinite"}:{}}>{loading?"⟳":"⟳"}</span>
          {loading ? "Analyzing…" : "Refresh"}
        </button>
      </div>
      <div className="max-w-5xl mx-auto px-4 py-6">
        <div className="flex gap-2 mb-6 items-center">
          {["mx","br"].map(c => (
            <button key={c} onClick={()=>setCountry(c)}
              className={`px-5 py-2 rounded-xl text-sm font-medium transition-colors ${country===c?"bg-gray-900 text-white":"bg-white border border-gray-200 text-gray-600 hover:border-gray-400"}`}>
              {c==="mx"?"🇲🇽 Mexico":"🇧🇷 Brazil"}
            </button>
          ))}
          {lastUpdated[country] && <span className="ml-auto text-xs text-gray-400">Updated {lastUpdated[country].toLocaleTimeString()}</span>}
        </div>
        {loading && (
          <div className="text-center py-16">
            <div className="text-4xl mb-4">📡</div>
            <p className="text-sm text-gray-600 font-medium">{progress}</p>
            <p className="text-xs text-gray-400 mt-1">This may take 1–2 minutes…</p>
          </div>
        )}
        {!current && !loading && (
          <div className="text-center py-20">
            <div className="text-5xl mb-4">📊</div>
            <p className="font-medium text-gray-600 mb-1">No data yet for {country==="mx"?"🇲🇽 Mexico":"🇧🇷 Brazil"}</p>
            <p className="text-sm text-gray-400 mb-2">Hit <strong>Refresh</strong> to start the analysis.</p>
            <p className="text-xs text-gray-300">{channels[country].length} channels configured</p>
          </div>
        )}
        {current && !loading && (
          <>
            <div className="flex items-center gap-2 mb-4">
              <Badge color="green">{current.length} active channel{current.length!==1?"s":""}</Badge>
              <span className="text-xs text-gray-400">with smartphone uploads in the past 30 days</span>
            </div>
            {current.length===0 && <p className="text-sm text-gray-400 text-center py-10">No matching videos found. Check the debug log.</p>}
            <div className="grid gap-4 md:grid-cols-2">
              {current.map((ch,i) => <ChannelCard key={i} ch={ch} />)}
            </div>
          </>
        )}
        <DebugLog logs={logs} />
        <div className="mt-8 max-w-sm">
          <AddChannelForm country={country} onAdd={addChannel} />
        </div>
      </div>
      <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
